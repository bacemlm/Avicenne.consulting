<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <title>Prener un Rendez-vous</title>
</head>
<body onload="booking()">
    <div class="booking-content">
        <div class="booking-container">
            <div class="booking-header">
                <h1>Prennez un RENDEZ-VOUS</h1>
                <p>Prendre un Rendez-vous chez AVICENNE Consulting</p>
            </div>
            <div class="content">
                <form class="booking-form" method="post" action="https://formspree.io/f/mojjqjqg">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone" required>
                    <label for="notes">Message</label>
                    <textarea id="notes" name="notes"></textarea>
                    <button type="submit" class="btn">Prendre le RDV</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
